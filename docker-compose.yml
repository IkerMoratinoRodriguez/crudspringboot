version: "3.8"
services:

  mysqldb:
    image: mysql:latest
    restart: always
    environment:
      - MYSQL_DATABASE=bdejemplo
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - '3306:3306'
    container_name: mysql01
  
  server:
    image: crud
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql01:3306/bdejemplo?serverTimezone=UTC
    depends_on:
      - mysqldb
    container_name: crud-container
