version: "3"
services:
  server:
    image: crudspring
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:mysql://localhost:3306/bdejemplo?useSSL=false
    networks:
      - red-prueba
    depends_on:
      - mysqldb

  mysqldb:
    image: mysql:latest
    networks:
      - red-prueba
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=bdejemplo
      - MYSQL_USER=root
networks:
  red-prueba: